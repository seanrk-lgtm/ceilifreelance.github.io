<body>
  <header>
    <a href="index.html" class="header-link">
      <h1>Ceili's Freelance Services</h1>
    </a>
  </header>
  
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>

  <section id="contact-intro">
    <h1>Contact Me!</h1>
    <p>I'd love to hear from you! Please fill out the form below or reach out using the contact details.</p>
  </section>

  <section id="contact-info">
    <div class="contact-details">
      <h2>Contact Information</h2>
      <p><strong>Phone:</strong> (808) 756-4974</p>
      <p><strong>Email:</strong> ceilichilson@gmail.com</p>
      <p><strong>Hours:</strong> Mon - Fri, 10am - 5pm HST</p>
    </div>

    <form id="contact-form" action="#" method="post" novalidate>
      <h2>Send Us a Message</h2>
      <label for="name">Name<span>*</span></label>
      <input type="text" id="name" name="name" required placeholder="Your full name">

      <label for="email">Email<span>*</span></label>
      <input type="email" id="email" name="email" required placeholder="your.email@example.com">

      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="Subject of your message">

      <label for="message">Message<span>*</span></label>
      <textarea id="message" name="message" rows="6" required placeholder="Write your message here..."></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>
</body>
</html>
